name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update apt cache
        run: sudo apt-get update -y

      - name: Download Neovim (stable) tarball
        run: |
          curl -L -o nvim-linux-x86_64.tar.gz https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz
          tar xzf nvim-linux-x86_64.tar.gz

      - name: Install tree-sitter CLI
        run: |
          curl -L https://github.com/tree-sitter/tree-sitter/releases/download/v0.26.1/tree-sitter-linux-x64.gz | gunzip > tree-sitter
          chmod +x tree-sitter
          sudo mv tree-sitter /usr/local/bin/

      - name: Run Vader tests
        run: ./run_vader_test

      - name: Run Lua tests
        run: ./run_lua_tests
